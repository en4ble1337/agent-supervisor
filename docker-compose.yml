version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - data:/app/data
    networks:
      - agent-net

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agent-net

  mock-agent:
    build:
      context: .
      dockerfile: docker/mock_agent.Dockerfile
    ports:
      - "8081:8000"
      - "8023:8022"
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  data:
